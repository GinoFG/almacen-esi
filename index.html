<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Almacén ESI</title>
<style>
  :root{
    --navy:#1a2340;
    --navy-light:#2a3a66;
    --red:#cc1f27;
    --bg:#f4f5f7;
    --card:#ffffff;
    --border:#e2e4ea;
    --text:#1a2340;
    --text-secondary:#6b7185;
    --green-bg:#eef2ec;
    --green-text:#4a5a3f;
    --amber-bg:#fdf3e0;
    --amber-text:#8a5a10;
    --red-bg:#fbe9e9;
    --red-text:#9c2024;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-text-size-adjust:100%;
  }
  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--bg);
    padding-bottom:90px;
  }
  header.topbar{
    background:var(--navy);
    padding:14px 16px;
    display:flex;
    align-items:center;
    gap:10px;
    position:sticky;
    top:0;
    z-index:20;
  }
  header.topbar img{
    height:30px;
    display:block;
  }
  header.topbar .titulo{
    color:#fff;
    font-size:15px;
    font-weight:600;
    flex:1;
  }
  header.topbar .usuario{
    color:#cfd4e6;
    font-size:12px;
  }
  nav.tabs{
    display:flex;
    background:#fff;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:58px;
    z-index:19;
  }
  nav.tabs button{
    flex:1;
    border:none;
    background:transparent;
    padding:12px 4px;
    font-size:13px;
    font-weight:600;
    color:var(--text-secondary);
    cursor:pointer;
    border-bottom:3px solid transparent;
  }
  nav.tabs button.active{
    color:var(--navy);
    border-bottom-color:var(--red);
  }
  main{
    padding:14px 14px 0;
  }
  .panel{display:none;}
  .panel.active{display:block;}

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
  }
  .card.activo-card{
    display:flex;
    gap:12px;
    align-items:flex-start;
  }
  .icono-equipo{
    width:42px;height:42px;
    border-radius:10px;
    background:#e9ebf3;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    font-size:18px;
    color:var(--navy);
  }
  .info-equipo{flex:1; min-width:0;}
  .nombre-equipo{
    font-size:14px; font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .detalle-equipo{
    font-size:12px; color:var(--text-secondary); margin-top:2px;
  }
  .badge-dias{
    display:inline-block;
    margin-top:6px;
    font-size:11px; font-weight:600;
    padding:3px 8px;
    border-radius:8px;
  }
  .badge-dias.ok{background:var(--green-bg); color:var(--green-text);}
  .badge-dias.warn{background:var(--amber-bg); color:var(--amber-text);}
  .badge-dias.alert{background:var(--red-bg); color:var(--red-text);}

  .btn-devolver{
    flex-shrink:0;
    border:1px solid #d3d6e0;
    background:#fff;
    border-radius:10px;
    padding:9px 12px;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
    color:var(--navy);
  }
  .btn-devolver:active{background:#f0f1f5;}

  label.field-label{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--text-secondary);
    margin-bottom:5px;
  }
  select, input[type=text], input[type=number], textarea{
    width:100%;
    border:1px solid #d3d6e0;
    border-radius:10px;
    padding:11px 12px;
    font-size:14px;
    margin-bottom:14px;
    background:#fff;
    color:var(--text);
    font-family:inherit;
  }
  textarea{resize:vertical;}

  .opcion-check, .opcion-radio{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 4px;
    font-size:13px;
    cursor:pointer;
    border-bottom:1px solid #f0f1f5;
  }
  .opcion-check:last-child, .opcion-radio:last-child{border-bottom:none;}
  .opcion-check input, .opcion-radio input{
    width:18px;height:18px;
    flex-shrink:0;
    accent-color:var(--navy);
  }

  .grupo-titulo{
    font-size:12px;
    font-weight:600;
    color:var(--text-secondary);
    margin:16px 0 4px;
  }
  .grupo-sub{
    font-size:11px;
    color:#9aa0b3;
    margin-bottom:6px;
  }

  .grid-categorias{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:14px;
  }
  .tarjeta-categoria{
    border:1.5px solid #d3d6e0;
    background:#fff;
    border-radius:14px;
    padding:16px 10px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    text-align:center;
  }
  .tarjeta-categoria .icono-grande{
    font-size:28px;
  }
  .tarjeta-categoria .nombre-cat{
    font-size:12.5px;
    font-weight:600;
    color:var(--text);
    line-height:1.25;
  }
  .tarjeta-categoria.active{
    background:var(--navy);
    border-color:var(--navy);
  }
  .tarjeta-categoria.active .nombre-cat{
    color:#fff;
  }
  .tarjeta-categoria.otro{
    border-style:dashed;
  }

  .btn-foto{
    width:100%;
    border:1.5px dashed #c4c8d4;
    background:#fafbfc;
    border-radius:12px;
    padding:20px;
    font-size:13px;
    color:var(--text-secondary);
    cursor:pointer;
    margin-bottom:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
  }
  .btn-foto.ok{
    border-style:solid;
    border-color:#7fa876;
    background:#f3f8f1;
    color:#3d6332;
  }
  .btn-foto svg{width:22px;height:22px;}

  .btn-primario{
    width:100%;
    background:var(--navy);
    color:#fff;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-primario:disabled{background:#9aa0b3; cursor:not-allowed;}
  .btn-primario:active:not(:disabled){background:var(--navy-light);}

  .btn-secundario{
    width:100%;
    border:1px solid #d3d6e0;
    background:#fff;
    border-radius:12px;
    padding:11px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    color:var(--text);
    margin-bottom:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }

  .contador{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .contador button{
    width:40px;height:40px;
    border-radius:50%;
    border:1px solid #d3d6e0;
    background:#fff;
    font-size:18px;
    cursor:pointer;
    color:var(--navy);
  }
  .contador .valor{
    font-size:20px;
    font-weight:700;
    min-width:24px;
    text-align:center;
  }
  .contador .disponibles{
    font-size:12px;
    color:var(--text-secondary);
  }

  .estado-vacio{
    text-align:center;
    padding:40px 20px;
    color:var(--text-secondary);
    font-size:13px;
  }

  .toast{
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    background:var(--navy);
    color:#fff;
    padding:12px 20px;
    border-radius:30px;
    font-size:13px;
    font-weight:600;
    z-index:50;
    box-shadow:0 4px 16px rgba(0,0,0,0.2);
    max-width:90%;
    text-align:center;
  }
  .toast.error{background:var(--red);}

  .modal-overlay{
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:60;
    padding:20px;
  }
  .modal-box{
    background:#fff;
    border-radius:16px;
    padding:20px;
    max-width:380px;
    width:100%;
    max-height:85vh;
    overflow-y:auto;
  }
  .modal-titulo{font-size:15px; font-weight:700; margin-bottom:4px;}
  .modal-sub{font-size:12px; color:var(--text-secondary); margin-bottom:14px;}
  .alerta-foto{
    background:var(--amber-bg);
    color:var(--amber-text);
    font-size:12.5px;
    padding:10px 12px;
    border-radius:10px;
    margin-bottom:14px;
    display:flex;
    gap:8px;
  }
  .modal-botones{display:flex; gap:8px; margin-top:6px;}
  .modal-botones button{flex:1;}
  .btn-cancelar{
    border:1px solid #d3d6e0;
    background:#fff;
    border-radius:10px;
    padding:11px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    color:var(--text);
  }

  .recovery-banner{
    background:var(--amber-bg);
    color:var(--amber-text);
    border-radius:12px;
    padding:12px;
    margin-bottom:14px;
    font-size:12.5px;
  }
  .ot-fija{
    background:var(--navy);
    color:#fff;
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:14px;
    font-size:13px;
    font-weight:600;
    display:flex;
    justify-content:space-between;
  }

  .spinner{
    display:inline-block;
    width:14px;height:14px;
    border:2px solid rgba(255,255,255,0.4);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin 0.7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  #pantalla-carga{
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:var(--navy);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    z-index:100;
    transition:opacity 0.35s ease;
  }
  #pantalla-carga.oculta{
    opacity:0;
    pointer-events:none;
  }
  #pantalla-carga img{
    height:46px;
  }
  #pantalla-carga .spinner-carga{
    width:26px;height:26px;
    border:3px solid rgba(255,255,255,0.25);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  #pantalla-carga .texto-carga{
    color:#cfd4e6;
    font-size:12.5px;
  }
</style>
</head>

// ===================== UTILIDADES DE RED (script-tag injection, Safari-safe) =====================

function backendCall(action, params, timeoutMs) {
  timeoutMs = timeoutMs || 20000;
  return new Promise((resolve, reject) => {
    const cbName = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
    const script = document.createElement("script");
    let qs = "action=" + encodeURIComponent(action) + "&callback=" + cbName;
    for (const k in params) {
      if (params[k] !== undefined && params[k] !== null) {
        qs += "&" + encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
      }
    }

    let finalizado = false;
    const timer = setTimeout(() => {
      if (finalizado) return;
      finalizado = true;
      reject(new Error("Tiempo de espera agotado conectando con el servidor (acción: " + action + ")."));
      delete window[cbName];
      script.remove();
    }, timeoutMs);

    window[cbName] = function (data) {
      if (finalizado) return;
      finalizado = true;
      clearTimeout(timer);
      resolve(data);
      delete window[cbName];
      script.remove();
    };
    script.onerror = () => {
      if (finalizado) return;
      finalizado = true;
      clearTimeout(timer);
      reject(new Error("No se pudo conectar con el servidor."));
      delete window[cbName];
      script.remove();
    };
    script.src = window.BACKEND_URL + "?" + qs;
    document.body.appendChild(script);
  });
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function compressImage(file, maxWidth = 1280, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();

    const timeoutId = setTimeout(() => {
      reject(new Error("Tiempo de espera agotado al procesar la imagen."));
    }, 15000);

    reader.onerror = () => {
      clearTimeout(timeoutId);
      reject(new Error("No se pudo leer el archivo de la foto."));
    };

    reader.onload = (e) => {
      img.onerror = () => {
        clearTimeout(timeoutId);
        reject(new Error("El formato de la foto no se pudo procesar. Intenta con otra foto o revisa la configuración de la cámara en Ajustes > Cámara > Formatos > 'Más compatible'."));
      };
      img.onload = () => {
        try {
          const canvas = document.createElement("canvas");
          const scale = Math.min(1, maxWidth / img.width);
          canvas.width = Math.max(1, Math.round(img.width * scale));
          canvas.height = Math.max(1, Math.round(img.height * scale));
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          canvas.toBlob((blob) => {
            clearTimeout(timeoutId);
            if (blob) resolve(blob);
            else reject(new Error("No se pudo comprimir la imagen."));
          }, "image/jpeg", quality);
        } catch (err) {
          clearTimeout(timeoutId);
          reject(err);
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function subirFotoAlBackend(file) {
  let blob;
  try {
    blob = await compressImage(file, 900, 0.55);
  } catch (err) {
    console.warn("Compresión falló, subiendo original:", err.message);
    blob = file;
  }

  const base64 = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = () => reject(new Error("No se pudo convertir la foto a base64."));
    reader.readAsDataURL(blob);
  });

  const mimeType = blob.type || "image/jpeg";
  const filename = "foto_" + Date.now() + (mimeType.includes("png") ? ".png" : ".jpg");

  // Se envía por POST con Content-Type "text/plain" a propósito: esto evita
  // que el navegador dispare un preflight OPTIONS, que Google Apps Script no
  // sabe responder (no soporta el verbo OPTIONS). Con text/plain, el POST se
  // considera una "solicitud simple" y se envía directo sin preflight.
  const payload = JSON.stringify({
    action: "subirFoto",
    base64,
    filename,
    mimeType,
  });

  const response = await fetch(window.BACKEND_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: payload,
  });

  if (!response.ok) {
    throw new Error("El servidor respondió con error (" + response.status + ") al subir la foto.");
  }
  return await response.json();
}

  try {

      backendCall("catalogo", {}),
      backendCall("activos", {}),

function diasBadgeClase(dias) {
  if (dias <= 2) return "ok";
  if (dias <= 6) return "warn";
  return "alert";
}

function renderActivos() {
  const cont = document.getElementById("panel-activos");
  if (!state.activos.length) {
    cont.innerHTML = '<div class="estado-vacio">No hay equipos prestados en este momento.</div>';
    return;
  }
  const ordenados = state.activos.slice().sort((a, b) => (b.Dias_Fuera || 0) - (a.Dias_Fuera || 0));
  let html = "";
  ordenados.forEach((a) => {
    const dias = a.Dias_Fuera || 0;
    const clase = diasBadgeClase(dias);
    const cat = inferirCategoriaDesdeId(a.ID_Equipo);
    const icono = (CATEGORIAS.find((c) => c.id === cat) || {}).icono || "📦";
    html += `
      <div class="card activo-card">
        <div class="icono-equipo">${icono}</div>
        <div class="info-equipo">
          <div class="nombre-equipo">${escapeHtml(a.Nombre_Equipo || a.ID_Equipo)}</div>
          <div class="detalle-equipo">${escapeHtml(a.Responsable)} · OT ${escapeHtml(a.OT || "—")}</div>
          <div class="badge-dias ${clase}">Hace ${dias} ${dias === 1 ? "día" : "días"}${dias >= 8 ? " — revisar" : ""}</div>
        </div>
        <button class="btn-devolver" onclick="abrirModalDevolucion('${a.ID_Equipo}')">Devolver</button>
      </div>`;
  });
  cont.innerHTML = html;
}

function inferirCategoriaDesdeId(id) {
  if (!id) return null;
  if (id.startsWith("OTRO::")) return "otro";
  if (id.startsWith("VC-")) return "vibracheck";
  if (id.startsWith("VS-")) return "videoscopia";
  if (id.startsWith("CAM-")) return "camara";
  if (id.startsWith("ESP-")) return "espesores";
  if (id.startsWith("AV-")) return "analizador";
  if (id.startsWith("US-")) return "ultrasonido";
  if (id.startsWith("AL-")) return "laser";
  if (id.startsWith("MEG-")) return "megometro";
  if (id.startsWith("POL-")) return "poleas";
  if (id.startsWith("YUGO-")) return "yugo";
  if (id.startsWith("PIST-")) return "pistola";
  if (id.startsWith("LDV-")) return "lineavida";
  if (id.startsWith("ARNES-")) return "arnes";
  if (id.startsWith("MULT-")) return "multimetro";
  if (id.startsWith("SOLD-")) return "soldar";
  if (id.startsWith("FALL-")) return "fallas";
  if (id.startsWith("INCL-")) return "inclinometro";
  if (id.startsWith("CEM-")) return "campoEM";
  if (id.startsWith("MANO-")) return "manometro";
  if (id.startsWith("DRONE-")) return "drone";
  return null;
}

function escapeHtml(str) {
  if (str === undefined || str === null) return "";
  return String(str).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// ===================== MODAL: DEVOLUCIÓN =====================

function abrirModalDevolucion(idEquipo) {
  const a = state.activos.find((x) => x.ID_Equipo === idEquipo);
  if (!a) return;
  const dias = a.Dias_Fuera || 0;
  const umbral = state.config.diasFotoObligatoria || 3;
  const requiereFoto = dias >= umbral;

  const root = document.getElementById("modal-root");
  root.innerHTML = `
    <div class="modal-overlay" id="modal-overlay-dev">
      <div class="modal-box">
        <div class="modal-titulo">Devolver ${escapeHtml(a.Nombre_Equipo || idEquipo)}</div>
        <div class="modal-sub">${escapeHtml(a.Responsable)} · hace ${dias} ${dias === 1 ? "día" : "días"}</div>
        ${requiereFoto ? `
          <div class="alerta-foto">⚠️ Estuvo ${dias} días afuera. Se requiere foto del equipo para confirmar la devolución.</div>
          <button class="btn-foto" id="btn-foto-devolucion" type="button">
            📷 <span id="label-foto-dev">Tomar foto del equipo</span>
          </button>
          <input type="file" accept="image/*" capture="environment" id="input-foto-dev" style="display:none;">
        ` : `<div class="modal-sub">Devolución dentro del plazo normal — no se requiere foto.</div>`}
        <div class="modal-botones">
          <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
          <button class="btn-primario" id="btn-confirmar-devolucion" ${requiereFoto ? "disabled" : ""}>Confirmar</button>
        </div>
      </div>
    </div>`;

  let fotoDevUrl = null;

  if (requiereFoto) {
    const inputFoto = document.getElementById("input-foto-dev");
    document.getElementById("btn-foto-devolucion").addEventListener("click", () => inputFoto.click());
    inputFoto.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      document.getElementById("label-foto-dev").textContent = "Subiendo foto...";
      try {
        const res = await subirFotoAlBackend(file);
        if (res.ok) {
          fotoDevUrl = res.url;
          document.getElementById("label-foto-dev").textContent = "Foto adjuntada ✓";
          document.getElementById("btn-foto-devolucion").classList.add("ok");
          const btn = document.getElementById("btn-confirmar-devolucion");
          btn.disabled = false;
        } else {
          showToast(res.error || "No se pudo subir la foto.", true);
          document.getElementById("label-foto-dev").textContent = "Tomar foto del equipo";
        }
      } catch (err) {
        showToast(err.message || "Error al subir la foto.", true);
        document.getElementById("label-foto-dev").textContent = "Tomar foto del equipo";
      }
    });
  }

  document.getElementById("btn-confirmar-devolucion").addEventListener("click", async () => {
    const btn = document.getElementById("btn-confirmar-devolucion");
    if (btn.disabled) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Confirmando...';
    try {
      const res = await backendCall("registrarDevolucion", { idEquipo, fotoUrl: fotoDevUrl || "" });
      if (res.ok) {
        showToast("Devolución registrada.");
        cerrarModal();
        await cargarTodo();
      } else {
        showToast(res.error || "No se pudo registrar la devolución.", true);
        btn.disabled = false;
        btn.textContent = "Confirmar";
      }
    } catch (err) {
      showToast("Error de conexión.", true);
      btn.disabled = false;
      btn.textContent = "Confirmar";
    }
  });
}

function disponiblesPorPrefijo(prefijo) {
  const idsPrestados = new Set(state.activos.map((a) => a.ID_Equipo));
  const idsEnCarrito = new Set(state.carritoSalida.flatMap((item) => item.ids));
  return state.catalogo.filter((eq) => eq.ID && eq.ID.startsWith(prefijo) && !idsPrestados.has(eq.ID) && !idsEnCarrito.has(eq.ID));
}

function adjuntarHandlersFormulario(catId) {
  if (catId === "vibracheck") {
    const completo = document.getElementById("vc-completo");
    const detalle = document.getElementById("vc-detalle");
    if (completo) {
      completo.addEventListener("change", (e) => {
        detalle.style.display = e.target.checked ? "none" : "block";
      });
    }
  }
  if (catId === "arnes") {
    const eq = state.catalogo.find((e) => e.ID === "ARNES-CANT");
    const yaEnCarrito = state.carritoSalida.filter((i) => i.ids.includes("ARNES-CANT")).length;
    const maxDisp = Math.max(1, (eq ? eq.Disponible : 4) - yaEnCarrito);
    let cant = 1;
    const out = document.getElementById("arnes-cant");
    document.getElementById("arnes-menos").addEventListener("click", () => {
      cant = Math.max(1, cant - 1);
      out.textContent = cant;
    });
    document.getElementById("arnes-mas").addEventListener("click", () => {
      cant = Math.min(maxDisp, cant + 1);
      out.textContent = cant;
    });
  }

  const btnAgregar = document.getElementById("btn-agregar-carrito");
  if (btnAgregar) {
    btnAgregar.addEventListener("click", () => agregarAlCarrito(catId));
  }

  // Guardar borrador en cualquier cambio dentro del formulario de categoría
  document.querySelectorAll("#form-dinamico input, #form-dinamico select").forEach((el) => {
    el.addEventListener("change", guardarBorrador);
  });
}

function etiquetaParaCarrito(catId, ids) {
  const cat = CATEGORIAS.find((c) => c.id === catId);
  const nombreCat = cat ? cat.nombre : (catId === "otro" ? "Otro equipo" : catId);
  if (catId === "otro") {
    const nombre = ids[0] ? ids[0].replace("OTRO::", "") : "";
    return "Otro: " + nombre;
  }
  if (catId === "arnes") {
    return "Arnés de cuerpo × " + ids.length;
  }
  // Para el resto, mostramos el nombre de la categoría + detalle de la unidad principal si existe
  const primerEq = state.catalogo.find((e) => e.ID === ids[0]);
  const detalle = primerEq ? (primerEq.Marca_Serie || primerEq.Nombre) : "";
  const extra = ids.length > 1 ? ` (+${ids.length - 1} accesorio${ids.length - 1 > 1 ? "s" : ""})` : "";
  return nombreCat + (detalle ? " — " + detalle : "") + extra;
}

function agregarAlCarrito(catId) {
  const ids = recolectarIdsSeleccionados(catId);
  if (ids.length === 0) {
    const msg = catId === "otro" ? "Escribe el nombre del equipo." : "Selecciona al menos un equipo.";
    showToast(msg, true);
    return;
  }
  state.carritoSalida.push({ catId, ids, etiqueta: etiquetaParaCarrito(catId, ids) });
  state.categoriaSeleccionada = null;
  document.getElementById("form-dinamico").innerHTML = "";
  document.querySelectorAll(".tarjeta-categoria").forEach((c) => c.classList.remove("active"));
  renderCarrito();
  guardarBorrador();
  showToast("Agregado. Elige otro equipo o completa la salida abajo.");

  // Vuelve a renderizar las categorías que dependen de disponibilidad
  // (por si el equipo recién agregado deja sin stock a esa categoría).
  document.getElementById("datos-comunes").scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function recolectarIdsSeleccionados(catId) {
  const ids = [];
  if (catId === "otro") {
    const nombre = document.getElementById("otro-nombre").value.trim();
    if (nombre) ids.push("OTRO::" + nombre);
  } else if (catId === "vibracheck") {
    const cuerpo = document.getElementById("vc-cuerpo");
    if (cuerpo) ids.push(cuerpo.value);
    const completo = document.getElementById("vc-completo");
    if (!completo || !completo.checked) {
      document.querySelectorAll(".vc-acel:checked").forEach((c) => ids.push(c.value));
      document.querySelectorAll(".vc-foto:checked").forEach((c) => ids.push(c.value));
      const carg = document.querySelector('input[name="vc-carg"]:checked');
      if (carg) ids.push(carg.value);
    }
  } else if (catId === "videoscopia") {
    const consola = document.querySelector('input[name="vs-consola"]:checked');
    if (consola) ids.push(consola.value);
    document.querySelectorAll(".vs-sonda:checked").forEach((c) => ids.push(c.value));
  } else if (catId === "arnes") {
    // Arnés se maneja distinto: por cantidad, no por ID individual.
    // El backend trata ARNES-CANT como pseudo-ID con Tipo_Seleccion=cantidad.
    const cant = parseInt(document.getElementById("arnes-cant").textContent, 10) || 1;
    for (let i = 0; i < cant; i++) ids.push("ARNES-CANT");
  } else if (catId === "drone") {
    ids.push("DRONE-01");
  } else {
    const sel = document.getElementById("simple-unidad");
    const fija = document.getElementById("simple-unidad-fija");
    if (sel) ids.push(sel.value);
    else if (fija) ids.push(fija.value);
  }
  return ids.filter(Boolean);
}

// ===================== DATOS COMUNES Y ENVÍO FINAL =====================

function renderDatosComunes() {
  const cont = document.getElementById("datos-comunes");
  if (!cont) return;
  let html = `<div class="card">`;
  html += `<label class="field-label">Quién lo retira</label>`;
  html += `<select id="sel-responsable">${state.config.personas.map((p) => `<option>${escapeHtml(p)}</option>`).join("")}</select>`;
  html += `<label class="field-label">N° de OT (opcional)</label>`;
  html += `<input type="text" id="inp-ot" placeholder="Ej. OT-4850">`;
  html += `<label class="field-label">Foto de salida</label>`;
  html += `<button type="button" class="btn-foto" id="btn-foto-salida">📷 <span id="label-foto-salida">Tomar foto del/los equipo(s)</span></button>`;
  html += `<input type="file" accept="image/*" capture="environment" id="input-foto-salida" style="display:none;">`;
  html += `<div id="nota-zona" style="display:none;"><label class="field-label">Observación</label><textarea id="txt-nota" rows="3" placeholder="Describe lo que pasó (ej. equipo con golpe leve, falta un accesorio, etc.)"></textarea></div>`;
  html += `<button type="button" class="btn-secundario" id="btn-toggle-nota">📝 Agregar nota</button>`;
  html += `<button type="button" class="btn-primario" id="btn-registrar-salida">Registrar salida completa</button>`;
  html += `</div>`;
  cont.innerHTML = html;

  const btnFoto = document.getElementById("btn-foto-salida");
  const inputFoto = document.getElementById("input-foto-salida");
  btnFoto.addEventListener("click", () => inputFoto.click());
  inputFoto.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById("label-foto-salida").textContent = "Subiendo foto...";
    try {
      const res = await subirFotoAlBackend(file);
      if (res.ok) {
        state.fotoSalidaData = res.url;
        document.getElementById("label-foto-salida").textContent = "Foto adjuntada ✓";
        btnFoto.classList.add("ok");
      } else {
        showToast(res.error || "No se pudo subir la foto.", true);
        document.getElementById("label-foto-salida").textContent = "Tomar foto del/los equipo(s)";
      }
    } catch (err) {
      showToast(err.message || "Error al subir la foto.", true);
      document.getElementById("label-foto-salida").textContent = "Tomar foto del/los equipo(s)";
    }
    guardarBorrador();
  });

  const btnNota = document.getElementById("btn-toggle-nota");
  const notaZona = document.getElementById("nota-zona");
  btnNota.addEventListener("click", () => {
    const visible = notaZona.style.display === "block";
    notaZona.style.display = visible ? "none" : "block";
    btnNota.textContent = visible ? "📝 Agregar nota" : "✕ Quitar nota";
  });

  document.getElementById("sel-responsable").addEventListener("change", guardarBorrador);
  document.getElementById("inp-ot").addEventListener("change", guardarBorrador);

  document.getElementById("btn-registrar-salida").addEventListener("click", registrarSalida);
}

async function registrarSalida() {
  if (state.carritoSalida.length === 0) {
    showToast("Agrega al menos un equipo antes de registrar la salida.", true);
    return;
  }
  const responsable = document.getElementById("sel-responsable").value;
  const ot = document.getElementById("inp-ot").value;
  const notaEl = document.getElementById("txt-nota");
  const nota = notaEl ? notaEl.value : "";

  if (!state.fotoSalidaData) {
    showToast("La foto de salida es obligatoria.", true);
    return;
  }

  const todosLosIds = state.carritoSalida.flatMap((item) => item.ids);

  const btn = document.getElementById("btn-registrar-salida");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Registrando...';

  try {
    const res = await backendCall("registrarSalida", {
      idsEquipo: todosLosIds.join(","),
      responsable,
      registradoPor: responsable,
      ot,
      observacion: nota,
      fotoUrl: state.fotoSalidaData,
    });
    if (res.ok) {
      showToast("Salida registrada correctamente.");
      limpiarBorrador();
      state.fotoSalidaData = null;
      state.categoriaSeleccionada = null;
      state.carritoSalida = [];
      await cargarTodo();
      document.querySelector('.tab-btn[data-tab="activos"]').click();
    } else {
      showToast(res.error || "No se pudo registrar la salida.", true);
      btn.disabled = false;
      btn.textContent = "Registrar salida completa";
    }
  } catch (err) {
    showToast("Error de conexión.", true);
    btn.disabled = false;
    btn.textContent = "Registrar salida completa";
  }
}

// ===================== BORRADOR (localStorage, sobrevive crashes) =====================

function guardarBorrador() {
  try {
    const draft = {
      categoria: state.categoriaSeleccionada,
      carrito: state.carritoSalida,
      responsable: document.getElementById("sel-responsable") ? document.getElementById("sel-responsable").value : "",
      ot: document.getElementById("inp-ot") ? document.getElementById("inp-ot").value : "",
      fotoSalidaData: state.fotoSalidaData,
      timestamp: Date.now(),
    };
    localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
  } catch (e) { /* almacenamiento no disponible, se ignora */ }
}

function limpiarBorrador() {
  try { localStorage.removeItem(DRAFT_KEY); } catch (e) {}
}

function restaurarBorrador() {
  let draft = null;
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    if (raw) draft = JSON.parse(raw);
  } catch (e) { return; }

  const tieneCarrito = draft && draft.carrito && draft.carrito.length > 0;
  const tieneCategoriaEnCurso = draft && draft.categoria;
  if (!draft || (!tieneCarrito && !tieneCategoriaEnCurso)) return;

  const banner = document.getElementById("recovery-banner");
  if (!banner) return;
  banner.style.display = "block";

  document.getElementById("recuperar-link").addEventListener("click", (e) => {
    e.preventDefault();
    if (tieneCarrito) {
      state.carritoSalida = draft.carrito;
      renderCarrito();
    }
    if (tieneCategoriaEnCurso) {
      seleccionarCategoria(draft.categoria, true);
    }
    setTimeout(() => {
      if (draft.responsable) document.getElementById("sel-responsable").value = draft.responsable;
      if (draft.ot) document.getElementById("inp-ot").value = draft.ot;
      if (draft.fotoSalidaData) {
        state.fotoSalidaData = draft.fotoSalidaData;
        const lbl = document.getElementById("label-foto-salida");
        if (lbl) lbl.textContent = "Foto adjuntada ✓";
      }
      if (draft.ot) {
        const otBanner = document.getElementById("ot-fija-banner");
        document.getElementById("ot-fija-valor").textContent = draft.ot;
        otBanner.style.display = "flex";
      }
    }, 50);
    banner.style.display = "none";
  });

  document.getElementById("descartar-link").addEventListener("click", (e) => {
    e.preventDefault();
    limpiarBorrador();
    banner.style.display = "none";
  });
}

// ===================== PANEL: HISTORIAL =====================

function renderHistorial() {
  const cont = document.getElementById("panel-historial");
  if (!state.historial.length) {
    cont.innerHTML = '<div class="estado-vacio">Sin historial todavía.</div>';
    return;
  }
  let html = "";
  state.historial.forEach((h) => {
    const fechaSalida = h.Fecha_Salida ? new Date(h.Fecha_Salida).toLocaleDateString("es-PE", { day: "2-digit", month: "short" }) : "—";
    const fechaDev = h.Fecha_Devolucion ? new Date(h.Fecha_Devolucion).toLocaleDateString("es-PE", { day: "2-digit", month: "short" }) : "—";
    html += `
      <div class="card" style="display:flex; align-items:center; justify-content:space-between;">
        <div>
          <div class="nombre-equipo">${escapeHtml(h.Nombre_Equipo)}</div>
          <div class="detalle-equipo">${escapeHtml(h.Responsable)}</div>
        </div>
        <div class="detalle-equipo">${fechaSalida} → ${fechaDev}</div>
      </div>`;
  });
  cont.innerHTML = html;
}

cargarTodo();
